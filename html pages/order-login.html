<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poetsen+One&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../css/main-style.css">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.3.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="bootstrap-5.3.3-dist/css/bootstrap.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
    <title>Login to Foodie</title>
</head>

<body>
    <!-- This is the navigation section -->
    <nav class="navbar navbar-expand-md bg-primary navbar-dark px-5 py-2">
        <div class="container px-lg-5">
            <a href="#" class="navbar-brand">
                <img src="../Images/foodie-logo.png" class="img-fluid" width="100px" alt="">
            </a>
            <!-- This button toggles the navbar on the smaller screen sizes -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navmenu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- This is the navigation that collapses on smaller screen sizes -->
            <div class="collapse navbar-collapse" id="navmenu">
                <ul class="navbar-nav ms-auto align-items-center justify-content-between">
                    <li class="navbar-item mx-2">
                        <a href="../index.html" class="nav-link">Home</a>
                    </li>

                    <li class="navbar-item mx-2">
                        <a href="menu.html" class="nav-link">Menu</a>
                    </li>

                </ul>
            </div>
        </div>
    </nav>

    <section class="mx-auto p-5 main-section">

        <div id="sign-up-section">
            <h1 class="text-center fw-bold foodie">Sign Up To Foodie</h1>
            <form id="sign-up-form" class="">
                <div class="mb-3">
                    <label for="name" class="form-label">Full Name</label> <br>
                    <input type="text" class="form-control" id="name" placeholder="Enter full name" name="name"
                        required>
                </div>
                <div class="mb-3 mt-3">
                    <label for="email2" class="form-label">Email:</label> <br>
                    <input type="email" class="form-control" id="email2" placeholder="Enter email" name="email"
                        required>
                </div>
                <div class="mb-3">
                    <label for="pwd2" class="form-label">Password:</label><br>
                    <input type="password" class="form-control" id="pwd2" placeholder="Enter password" name="pswd"
                        required>
                </div>
                <div class="mb-3">
                    <label for="pwd-confirm" class="form-label">Confirm Password:</label><br>
                    <input type="password" class="form-control" id="pwd-confirm" placeholder="Confirm password"
                        name="pswd-confirm" required>
                </div>

                <button onclick="onSignUp()" class="btn btn-primary">Submit</button>
            </form>
        </div>


        <div id="approval-section" class="p-5 mx-auto text-center">
            <div class="card mx-auto" style="max-width: 60%;">
                <div class="card-body">
                    <h3 class="foodie card-title">Sign up successful!</h3>
                    <p class="card-text">You have successfully created a foodie account. <br> You can now place order
                        and
                        enjoy our delicious meals.</p>
                    <a href="../index.html" class="btn btn-primary">Back to homepage</a>
                </div>
            </div>
        </div>

    </section>

    <script src="../js/script.js"></script>
</body>

</html>
